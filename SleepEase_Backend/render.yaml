services:
  - type: web
    name: sleepease-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: GROQ_API_KEY
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: FIREBASE_CREDENTIALS
        sync: false
